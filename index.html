<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yadav Satish - VIP Music Hub</title>
    
    <!-- SEO & Thumbnail -->
    <meta name="description" content="Yadav Satish VIP Music Hub - Latest Bhojpuri Songs">
    <meta property="og:image" content="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?fit=crop&w=600&h=300">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1384/1384061.png">

    <style>
        :root { --blood: #ff0000; --bg: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 5%; background: #000; border-bottom: 2px solid var(--blood);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { color: var(--blood); font-size: 20px; font-weight: bold; cursor: pointer; }

        .search-area { display: flex; width: 65%; gap: 5px; }
        input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid var(--blood); background: #111; color: #fff; outline: none; }
        .btn-s { padding: 8px 12px; background: var(--blood); border: none; color: #fff; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .container { padding: 15px 5%; }
        
        /* BACK BUTTON */
        .back-btn { 
            display: none; background: #222; color: #fff; border: 1px solid var(--blood); 
            padding: 10px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 15px;
        }

        #watch-view { display: none; }

        .player-box { background: #000; border: 1px solid var(--blood); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .iframe-wrap { position: relative; width: 100%; padding-bottom: 56.25%; }
        .iframe-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .v-title { padding: 10px; font-size: 15px; text-align: center; border-top: 1px solid #222; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .card { background: #111; border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid #222; }
        .card img { width: 100%; height: 90px; object-fit: cover; }
        .card-info { padding: 8px; font-size: 11px; height: 40px; overflow: hidden; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">YADAV SATISH</div>
    <div class="search-area">
        <input type="text" id="srch" placeholder="Gana Search Karein...">
        <button class="btn-s" onclick="search()">Search</button>
        <button class="btn-s" onclick="startVoice()">🎤</button>
    </div>
</header>

<div class="container">
    <button id="globalBackBtn" class="back-btn" onclick="goHome()">⬅ PEECHE JAYEIN (BACK)</button>

    <div id="home-view">
        <h3 id="gridTitle" style="margin-bottom:15px; color:var(--blood)">LATEST SONGS</h3>
        <div class="video-grid" id="mainGrid"></div>
    </div>

    <div id="watch-view">
        <div class="player-box" id="playerParent">
            <!-- Iframe directly used for better Glitch compatibility -->
            <div class="iframe-wrap">
                <iframe id="mainPlayer" src="" allow="autoplay; fullscreen"></iframe>
            </div>
            <div class="v-title" id="vTitle">Loading...</div>
        </div>
        <h4 style="margin-bottom:10px; color:var(--blood)">AAPKE LIYE 50 GAANE</h4>
        <div class="video-grid" id="sideGrid"></div>
    </div>
</div>

<script>
    const KEY = 'AIzaSyAiy3YkvJAec66NMIr2ulZToesvphZ4UMs'; 
    let currentList = [];

    async function load(q, grid, limit = 50) {
        const gridDiv = document.getElementById(grid);
        gridDiv.innerHTML = '<p style="padding:10px;">Loading...</p>';
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=${limit}&q=${encodeURIComponent(q)}&type=video&videoDuration=medium&key=${KEY}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            if(data.items) {
                currentList = data.items;
                gridDiv.innerHTML = '';
                currentList.forEach(i => {
                    gridDiv.innerHTML += `
                    <div class="card" onclick="play('${i.id.videoId}','${i.snippet.title.replace(/'/g,"")}')">
                        <img src="${i.snippet.thumbnails.medium.url}">
                        <div class="card-info"><b>${i.snippet.title}</b></div>
                    </div>`;
                });
            }
        } catch(e) { 
            gridDiv.innerHTML = '<p style="color:red; padding:10px;">API Limit reached or Connection Error!</p>'; 
        }
    }

    function play(id, t) {
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('watch-view').style.display = 'block';
        document.getElementById('globalBackBtn').style.display = 'block';
        document.getElementById('vTitle').innerText = t;
        
        // Direct Iframe Source update for better stability
        document.getElementById('mainPlayer').src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
        
        window.scrollTo(0,0);
        load(t + " remix", 'sideGrid', 50);
    }

    function search() {
        let q = document.getElementById('srch').value;
        if(q) {
            document.getElementById('gridTitle').innerText = "Results for: " + q;
            document.getElementById('globalBackBtn').style.display = 'block';
            load(q, 'mainGrid', 50);
            goHome(true); 
        }
    }

    function startVoice() {
        const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Rec) return alert("Browser Mic support nahi karta.");
        const r = new Rec();
        r.onresult = (e) => {
            document.getElementById('srch').value = e.results[0][0].transcript;
            search();
        };
        r.start();
    }

    function goHome(keepSearch = false) {
        if(!keepSearch) {
            document.getElementById('mainPlayer').src = ""; // Stop video
            document.getElementById('globalBackBtn').style.display = 'none';
            document.getElementById('gridTitle').innerText = "LATEST SONGS";
            load('Bhojpuri New Hits 2026', 'mainGrid', 50);
        }
        document.getElementById('watch-view').style.display = 'none';
        document.getElementById('home-view').style.display = 'block';
    }

    window.onload = () => load('Bhojpuri New Hits 2026', 'mainGrid', 50);
</script>
</body>
</html>
